<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>CD Collection</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&display=swap" rel="stylesheet">
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }

        :root {
            --bg: #0a0a0a;
            --surface: #141414;
            --surface-hover: #1a1a1a;
            --surface-raised: #1e1e1e;
            --border: #222;
            --text: #eee;
            --text-dim: #888;
            --text-faint: #555;
            --accent: #1db954;
            --accent-glow: rgba(29, 185, 84, 0.15);
            --radius: 6px;
        }

        body {
            font-family: 'Inter', -apple-system, BlinkMacSystemFont, sans-serif;
            background: var(--bg);
            color: var(--text);
            min-height: 100vh;
            -webkit-font-smoothing: antialiased;
        }

        /* ── Sticky top bar ── */
        .topbar {
            position: sticky;
            top: 0;
            z-index: 100;
            background: rgba(10,10,10,.85);
            backdrop-filter: blur(20px) saturate(180%);
            -webkit-backdrop-filter: blur(20px) saturate(180%);
            border-bottom: 1px solid var(--border);
            padding: 0 clamp(1rem, 3vw, 2.5rem);
        }
        .topbar-inner {
            max-width: 1600px;
            margin: 0 auto;
            display: flex;
            align-items: center;
            gap: 1.5rem;
            height: 64px;
        }
        .logo {
            font-weight: 700;
            font-size: 1.1rem;
            letter-spacing: -0.3px;
            white-space: nowrap;
            color: var(--text);
        }
        .logo span { color: var(--accent); }
        .search-wrap {
            flex: 1;
            max-width: 420px;
            position: relative;
        }
        .search-wrap svg {
            position: absolute;
            left: 12px;
            top: 50%;
            transform: translateY(-50%);
            color: var(--text-faint);
            pointer-events: none;
        }
        .search {
            width: 100%;
            background: var(--surface);
            border: 1px solid var(--border);
            border-radius: 20px;
            padding: 8px 14px 8px 38px;
            color: var(--text);
            font-size: .875rem;
            font-family: inherit;
            outline: none;
            transition: border-color .2s, box-shadow .2s;
        }
        .search::placeholder { color: var(--text-faint); }
        .search:focus {
            border-color: var(--accent);
            box-shadow: 0 0 0 3px var(--accent-glow);
        }
        .controls {
            display: flex;
            gap: .5rem;
            align-items: center;
            margin-left: auto;
        }
        .pill-select {
            background: var(--surface);
            border: 1px solid var(--border);
            border-radius: 20px;
            padding: 7px 14px;
            color: var(--text-dim);
            font-size: .8rem;
            font-family: inherit;
            cursor: pointer;
            outline: none;
            transition: border-color .2s;
            -webkit-appearance: none;
            appearance: none;
        }
        .pill-select:hover, .pill-select:focus { border-color: var(--text-faint); color: var(--text); }
        .count {
            font-size: .8rem;
            color: var(--text-faint);
            white-space: nowrap;
            font-variant-numeric: tabular-nums;
        }
        .count b { color: var(--text-dim); font-weight: 600; }

        /* ── Grid ── */
        .grid-wrap {
            max-width: 1600px;
            margin: 0 auto;
            padding: 1.5rem clamp(1rem, 3vw, 2.5rem) 3rem;
        }
        .grid {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(170px, 1fr));
            gap: 1.25rem;
        }

        /* ── Card ── */
        .card {
            cursor: pointer;
            border-radius: var(--radius);
            background: var(--surface);
            padding: 12px 12px 14px;
            transition: background .2s, transform .15s;
            position: relative;
        }
        .card:hover {
            background: var(--surface-hover);
            transform: translateY(-2px);
        }
        .card:hover .cover-img { box-shadow: 0 8px 24px rgba(0,0,0,.5); }
        .cover-wrap {
            position: relative;
            width: 100%;
            aspect-ratio: 1;
            border-radius: 4px;
            overflow: hidden;
            margin-bottom: 10px;
            background: var(--surface-raised);
        }
        .cover-img {
            width: 100%;
            height: 100%;
            object-fit: cover;
            display: block;
            transition: box-shadow .25s;
        }
        .cover-placeholder {
            width: 100%;
            height: 100%;
            display: flex;
            align-items: center;
            justify-content: center;
            background: linear-gradient(135deg, #1a1a1a 0%, #111 100%);
        }
        .cover-placeholder svg { width: 40%; opacity: .25; }
        .card-title {
            font-size: .85rem;
            font-weight: 600;
            line-height: 1.3;
            white-space: nowrap;
            overflow: hidden;
            text-overflow: ellipsis;
            margin-bottom: 2px;
        }
        .card-sub {
            font-size: .75rem;
            color: var(--text-dim);
            white-space: nowrap;
            overflow: hidden;
            text-overflow: ellipsis;
        }

        /* ── Modal overlay ── */
        .overlay {
            display: none;
            position: fixed;
            inset: 0;
            z-index: 200;
            background: rgba(0,0,0,.65);
            backdrop-filter: blur(6px);
            -webkit-backdrop-filter: blur(6px);
            align-items: center;
            justify-content: center;
            padding: 1rem;
        }
        .overlay.open { display: flex; }
        .modal {
            background: var(--surface-raised);
            border: 1px solid var(--border);
            border-radius: 12px;
            max-width: 480px;
            width: 100%;
            max-height: 90vh;
            overflow-y: auto;
            animation: slideIn .25s ease;
        }
        @keyframes slideIn {
            from { opacity: 0; transform: translateY(12px) scale(.98); }
            to { opacity: 1; transform: translateY(0) scale(1); }
        }
        .modal-top {
            position: relative;
            padding: 24px 24px 0;
            display: flex;
            gap: 20px;
        }
        .modal-cover {
            width: 160px;
            height: 160px;
            border-radius: 6px;
            object-fit: cover;
            flex-shrink: 0;
            background: var(--surface);
            box-shadow: 0 8px 32px rgba(0,0,0,.4);
        }
        .modal-info { flex: 1; min-width: 0; padding-top: 4px; }
        .modal-artist {
            font-size: .75rem;
            font-weight: 600;
            text-transform: uppercase;
            letter-spacing: .6px;
            color: var(--accent);
            margin-bottom: 4px;
        }
        .modal-title {
            font-size: 1.35rem;
            font-weight: 700;
            line-height: 1.2;
            margin-bottom: 6px;
            letter-spacing: -.3px;
        }
        .modal-year {
            font-size: .85rem;
            color: var(--text-dim);
            margin-bottom: 12px;
        }
        .modal-badges {
            display: flex;
            gap: 6px;
            flex-wrap: wrap;
        }
        .badge {
            font-size: .7rem;
            padding: 3px 8px;
            border-radius: 20px;
            background: rgba(255,255,255,.06);
            color: var(--text-dim);
            border: 1px solid var(--border);
        }
        .modal-close {
            position: absolute;
            top: 16px;
            right: 16px;
            width: 28px;
            height: 28px;
            border-radius: 50%;
            border: none;
            background: rgba(255,255,255,.08);
            color: var(--text-dim);
            font-size: 1rem;
            cursor: pointer;
            display: flex;
            align-items: center;
            justify-content: center;
            transition: background .2s, color .2s;
        }
        .modal-close:hover { background: rgba(255,255,255,.15); color: var(--text); }
        .modal-meta {
            display: grid;
            grid-template-columns: 1fr 1fr 1fr;
            gap: 1px;
            background: var(--border);
            margin: 20px 24px 0;
            border-radius: 8px;
            overflow: hidden;
        }
        .meta-cell {
            background: var(--surface-raised);
            padding: 12px 14px;
            text-align: center;
        }
        .meta-label { font-size: .65rem; text-transform: uppercase; letter-spacing: .5px; color: var(--text-faint); margin-bottom: 3px; }
        .meta-val { font-size: .9rem; font-weight: 600; }
        .modal-links {
            display: flex;
            gap: 8px;
            padding: 20px 24px 24px;
        }
        .link-btn {
            flex: 1;
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 6px;
            padding: 10px;
            border-radius: 8px;
            text-decoration: none;
            font-size: .8rem;
            font-weight: 500;
            font-family: inherit;
            transition: background .2s, color .2s;
            border: 1px solid var(--border);
            color: var(--text-dim);
            background: transparent;
        }
        .link-btn:hover { background: rgba(255,255,255,.06); color: var(--text); }
        .link-btn svg { width: 14px; height: 14px; }

        /* ── Empty state ── */
        .empty {
            text-align: center;
            padding: 4rem 1rem;
            color: var(--text-faint);
        }
        .empty p { font-size: .9rem; margin-top: .5rem; }

        /* ── Responsive ── */
        @media (max-width: 700px) {
            .topbar-inner { flex-wrap: wrap; height: auto; padding: 10px 0; gap: .75rem; }
            .search-wrap { max-width: none; order: 10; width: 100%; }
            .controls { order: 5; }
            .grid { grid-template-columns: repeat(auto-fill, minmax(140px, 1fr)); gap: 1rem; }
            .modal-top { flex-direction: column; align-items: center; text-align: center; }
            .modal-cover { width: 200px; height: 200px; }
            .modal-badges { justify-content: center; }
        }
    </style>
</head>

</div>

const PH = `<svg viewBox="0 0 120 120" fill="none" xmlns="http://www.w3.org/2000/svg">
  <circle cx="60" cy="60" r="54" stroke="#333" stroke-width="4"/>
  <circle cx="60" cy="60" r="38" stroke="#2a2a2a" stroke-width="1"/>
  <circle cx="60" cy="60" r="22" stroke="#2a2a2a" stroke-width="1"/>
  <circle cx="60" cy="60" r="8" fill="#333"/>
</svg>`;

/* ── Populate type filter from data ── */
const types = [...new Set(ALBUMS.map(a => a.type).filter(Boolean))].sort();
types.forEach(t => { const o = document.createElement('option'); o.value = t; o.textContent = t; $type.appendChild(o); });
$total.textContent = ALBUMS.length;

/* ── Render ── */
function render() {
    const q = $search.value.toLowerCase();
    const t = $type.value;
    const s = $sort.value;

    filtered = ALBUMS.filter(a => {
        if (t && a.type !== t) return false;
        if (q && !a.artist.toLowerCase().includes(q) && !a.title.toLowerCase().includes(q)) return false;
        return true;
    });

    filtered.sort((a, b) => {
        switch (s) {
            case 'artist':    return a.artist.localeCompare(b.artist);
            case 'year-desc': return (b.year || 0) - (a.year || 0);
            case 'year-asc':  return (a.year || 0) - (b.year || 0);
            case 'recent':    return (b.last_played || '').localeCompare(a.last_played || '');
        }
    });

    $shown.textContent = filtered.length;
    $grid.innerHTML = '';

    if (!filtered.length) { $empty.style.display = 'block'; return; }
    $empty.style.display = 'none';

    filtered.forEach((a, i) => {
        const card = document.createElement('div');
        card.className = 'card';
        card.setAttribute('role', 'button');
        card.setAttribute('tabindex', '0');
        card.innerHTML = `
            <div class="cover-wrap">${a.cover_url
                ? `<img class="cover-img" loading="lazy" alt="" src="${esc(a.cover_url)}" onerror="this.parentNode.innerHTML='<div class=\\'cover-placeholder\\'>${PH}</div>'">`
                : `<div class="cover-placeholder">${PH}</div>`}
            </div>
            <div class="card-title">${esc(a.title)}</div>
            <div class="card-sub">${esc(a.artist)}${a.year ? ' &middot; ' + a.year : ''}</div>`;
        card.onclick = () => openModal(a);
        card.onkeydown = e => { if (e.key === 'Enter') openModal(a); };
        $grid.appendChild(card);
    });
}

/* ── Modal ── */
function openModal(a) {
    document.getElementById('mArtist').textContent = a.artist;
    document.getElementById('mTitle').textContent = a.title;
    document.getElementById('mYear').textContent = [a.year, a.type].filter(Boolean).join(' \u00b7 ');
    document.getElementById('mRuntime').textContent = a.length || (a.runtime ? Math.round(a.runtime) + ' min' : '\u2014');
    document.getElementById('mType').textContent = a.type || '\u2014';
    document.getElementById('mPlayed').textContent = a.last_played ? fmtDate(a.last_played) : '\u2014';

    const cover = document.getElementById('mCover');
    cover.src = a.cover_url || '';
    cover.onerror = () => { cover.style.display = 'none'; };
    cover.style.display = a.cover_url ? 'block' : 'none';

    const badges = document.getElementById('mBadges');
    badges.innerHTML = '';
    if (a.played) badges.innerHTML += `<span class="badge">${esc(a.played)}</span>`;
    if (a.scrobble) badges.innerHTML += `<span class="badge">${esc(a.scrobble)}</span>`;

    const links = document.getElementById('mLinks');
    links.innerHTML = '';
    if (a.mb_url) links.innerHTML += `<a class="link-btn" href="${esc(a.mb_url)}" target="_blank" rel="noopener"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><circle cx="12" cy="12" r="10"/><path d="M2 12h20"/><path d="M12 2a15.3 15.3 0 0 1 4 10 15.3 15.3 0 0 1-4 10 15.3 15.3 0 0 1-4-10 15.3 15.3 0 0 1 4-10z"/></svg>MusicBrainz</a>`;
    if (a.discogs_url) links.innerHTML += `<a class="link-btn" href="${esc(a.discogs_url)}" target="_blank" rel="noopener"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><circle cx="12" cy="12" r="10"/><circle cx="12" cy="12" r="3"/></svg>Discogs</a>`;
    if (a.direct_scrobble_url) links.innerHTML += `<a class="link-btn" href="${esc(a.direct_scrobble_url)}" target="_blank" rel="noopener">Scrobble</a>`;

    $overlay.classList.add('open');
    document.body.style.overflow = 'hidden';
}

function closeModal() {
    $overlay.classList.remove('open');
    document.body.style.overflow = '';
}

document.getElementById('mClose').onclick = closeModal;
$overlay.onclick = e => { if (e.target === $overlay) closeModal(); };
document.onkeydown = e => { if (e.key === 'Escape') closeModal(); };

/* ── Utils ── */
function esc(s) { const d = document.createElement('div'); d.textContent = s; return d.innerHTML; }
function fmtDate(s) { try { return new Date(s+'T00:00:00').toLocaleDateString('en-GB', {day:'numeric',month:'short',year:'numeric'}); } catch { return s; } }

/* ── Events ── */
$search.addEventListener('input', render);
$type.addEventListener('change', render);
$sort.addEventListener('change', render);

/* ── Go ── */
render();
</script>
</body>
</html>
