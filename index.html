<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Music Collection Gallery</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&display=swap" rel="stylesheet">
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        :root {
            --tile-size: 170px;
            --accent: #1db954;
            --bg: #0a0a0a;
            --surface-1: #141414;
            --surface-2: #1a1a1a;
            --surface-3: #1e1e1e;
            --text: #ffffff;
            --text-dim: #b3b3b3;
            --border: #282828;
        }

        html, body {
            width: 100%;
            height: 100%;
            overflow-x: hidden;
        }

        body {
            background: var(--bg);
            color: var(--text);
            font-family: Inter, -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
            line-height: 1.6;
            font-size: 14px;
        }

        /* Top Bar */
        .topbar {
            position: sticky;
            top: 0;
            z-index: 100;
            background: rgba(10, 10, 10, 0.95);
            backdrop-filter: blur(10px);
            border-bottom: 1px solid var(--border);
            padding: 12px 16px;
            display: flex;
            align-items: center;
            gap: 16px;
            flex-wrap: wrap;
        }

        .topbar-logo {
            font-size: 18px;
            font-weight: 700;
            white-space: nowrap;
            letter-spacing: -0.5px;
        }

        .topbar-search {
            flex: 1;
            min-width: 150px;
            max-width: 300px;
        }

        .search-input {
            width: 100%;
            background: var(--surface-1);
            border: 1px solid var(--border);
            color: var(--text);
            padding: 8px 12px;
            border-radius: 20px;
            font-size: 14px;
            font-family: Inter, sans-serif;
        }

        .search-input::placeholder {
            color: var(--text-dim);
        }

        .search-input:focus {
            outline: none;
            border-color: var(--accent);
        }

        /* Pill Buttons */
        .pill-group {
            display: flex;
            gap: 6px;
            background: var(--surface-1);
            padding: 4px;
            border-radius: 20px;
        }

        .pill-btn {
            padding: 6px 14px;
            border: none;
            background: transparent;
            color: var(--text-dim);
            border-radius: 16px;
            cursor: pointer;
            font-size: 13px;
            font-weight: 500;
            font-family: Inter, sans-serif;
            transition: all 0.2s ease;
            white-space: nowrap;
        }

        .pill-btn:hover {
            color: var(--text);
        }

        .pill-btn.active {
            background: var(--accent);
            color: var(--bg);
        }

        .pill-count {
            margin-left: 4px;
            opacity: 0.7;
            font-size: 12px;
        }

        /* Dropdowns */
        .dropdown {
            position: relative;
        }

        .dropdown-btn {
            padding: 8px 12px;
            background: var(--surface-1);
            border: 1px solid var(--border);
            color: var(--text);
            border-radius: 6px;
            cursor: pointer;
            font-size: 13px;
            font-weight: 500;
            font-family: Inter, sans-serif;
            display: flex;
            align-items: center;
            gap: 6px;
            white-space: nowrap;
            transition: all 0.2s ease;
        }

        .dropdown-btn:hover {
            border-color: var(--accent);
        }

        .dropdown-menu {
            position: absolute;
            top: 100%;
            left: 0;
            background: var(--surface-2);
            border: 1px solid var(--border);
            border-radius: 8px;
            min-width: 150px;
            margin-top: 4px;
            display: none;
            flex-direction: column;
            z-index: 200;
            box-shadow: 0 10px 40px rgba(0, 0, 0, 0.5);
        }

        .dropdown-menu.show {
            display: flex;
        }

        .dropdown-item {
            padding: 10px 16px;
            background: none;
            border: none;
            color: var(--text);
            cursor: pointer;
            text-align: left;
            font-size: 13px;
            font-family: Inter, sans-serif;
            transition: all 0.15s ease;
        }

        .dropdown-item:hover {
            background: var(--surface-3);
        }

        .dropdown-item.active {
            color: var(--accent);
            font-weight: 600;
        }

        /* Size Slider */
        .size-slider-group {
            display: flex;
            align-items: center;
            gap: 8px;
            padding: 0 4px;
        }

        .size-slider {
            width: 100px;
            height: 4px;
            border-radius: 2px;
            background: var(--surface-1);
            outline: none;
            -webkit-appearance: none;
            cursor: pointer;
        }

        .size-slider::-webkit-slider-thumb {
            -webkit-appearance: none;
            appearance: none;
            width: 14px;
            height: 14px;
            border-radius: 50%;
            background: var(--accent);
            cursor: pointer;
            transition: all 0.2s ease;
        }

        .size-slider::-webkit-slider-thumb:hover {
            transform: scale(1.2);
        }

        .size-slider::-moz-range-thumb {
            width: 14px;
            height: 14px;
            border-radius: 50%;
            background: var(--accent);
            border: none;
            cursor: pointer;
            transition: all 0.2s ease;
        }

        .size-slider::-moz-range-thumb:hover {
            transform: scale(1.2);
        }

        /* Main Grid */
        .container {
            padding: 20px 16px;
            max-width: 1600px;
            margin: 0 auto;
        }

        .grid {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(var(--tile-size), 1fr));
            gap: 16px;
            margin-top: 16px;
        }

        /* Cards */
        .card {
            background: var(--surface-1);
            border: 1px solid var(--border);
            border-radius: 8px;
            overflow: hidden;
            cursor: pointer;
            transition: all 0.2s ease;
            role: "button";
            tabindex: "0";
            display: flex;
            flex-direction: column;
        }

        .card:hover {
            transform: translateY(-2px);
            border-color: var(--accent);
            box-shadow: 0 8px 20px rgba(29, 185, 84, 0.2);
        }

        .card:focus-visible {
            outline: 2px solid var(--accent);
            outline-offset: -2px;
        }

        .card-image-wrapper {
            width: 100%;
            aspect-ratio: 1;
            background: var(--surface-2);
            display: flex;
            align-items: center;
            justify-content: center;
            overflow: hidden;
            position: relative;
        }

        .card-image {
            width: 100%;
            height: 100%;
            object-fit: cover;
            transition: all 0.3s ease;
        }

        .card:hover .card-image {
            transform: scale(1.05);
        }

        .card-placeholder {
            width: 100%;
            height: 100%;
        }

        .card-content {
            padding: 12px;
            flex: 1;
            display: flex;
            flex-direction: column;
            justify-content: space-between;
        }

        .card-title {
            font-weight: 600;
            font-size: 13px;
            line-height: 1.4;
            margin-bottom: 4px;
            color: var(--text);
            word-break: break-word;
        }

        .card-meta {
            font-size: 12px;
            color: var(--text-dim);
            margin-bottom: 4px;
        }

        .card-runtime {
            font-size: 11px;
            color: var(--text-dim);
            opacity: 0.8;
        }

        .card-actions {
            display: flex;
            align-items: center;
            gap: 6px;
            margin-top: 8px;
            padding-top: 8px;
            border-top: 1px solid var(--border);
            justify-content: space-between;
        }

        .icon-btn {
            width: 24px;
            height: 24px;
            display: flex;
            align-items: center;
            justify-content: center;
            background: none;
            border: none;
            cursor: pointer;
            color: var(--text-dim);
            transition: all 0.2s ease;
            padding: 0;
        }

        .icon-btn:hover {
            color: var(--accent);
            transform: scale(1.1);
        }

        .icon-btn.disabled {
            opacity: 0.4;
            cursor: default;
        }

        .icon-btn.disabled:hover {
            color: var(--text-dim);
            transform: none;
        }

        .collection-badge {
            font-size: 9px;
            font-weight: 700;
            color: var(--text-dim);
            text-transform: uppercase;
            letter-spacing: 0.5px;
            opacity: 0.6;
        }

        /* Modal */
        .modal-overlay {
            position: fixed;
            top: 0;
            left: 0;
            right: 0;
            bottom: 0;
            background: rgba(0, 0, 0, 0.8);
            display: none;
            align-items: center;
            justify-content: center;
            z-index: 300;
            backdrop-filter: blur(4px);
            padding: 20px;
            animation: fadeIn 0.2s ease;
        }

        .modal-overlay.show {
            display: flex;
        }

        @keyframes fadeIn {
            from {
                opacity: 0;
            }
            to {
                opacity: 1;
            }
        }

        @keyframes slideUp {
            from {
                transform: translateY(20px);
                opacity: 0;
            }
            to {
                transform: translateY(0);
                opacity: 1;
            }
        }

        .modal {
            background: var(--surface-1);
            border: 1px solid var(--border);
            border-radius: 12px;
            width: 100%;
            max-width: 500px;
            max-height: 90vh;
            overflow-y: auto;
            animation: slideUp 0.3s ease;
            position: relative;
        }

        .modal-close {
            position: absolute;
            top: 16px;
            right: 16px;
            width: 32px;
            height: 32px;
            display: flex;
            align-items: center;
            justify-content: center;
            background: var(--surface-2);
            border: 1px solid var(--border);
            border-radius: 50%;
            cursor: pointer;
            color: var(--text);
            font-size: 20px;
            font-weight: 300;
            transition: all 0.2s ease;
            z-index: 10;
            padding: 0;
            font-family: sans-serif;
        }

        .modal-close:hover {
            background: var(--accent);
            color: var(--bg);
        }

        .modal-image {
            width: 100%;
            aspect-ratio: 1;
            object-fit: cover;
            background: var(--surface-2);
        }

        .modal-content {
            padding: 24px 20px 20px;
        }

        .modal-header {
            margin-bottom: 20px;
        }

        .modal-artist {
            font-size: 12px;
            color: var(--accent);
            font-weight: 700;
            text-transform: uppercase;
            letter-spacing: 1px;
            margin-bottom: 6px;
        }

        .modal-title {
            font-size: 24px;
            font-weight: 700;
            margin-bottom: 8px;
            line-height: 1.3;
        }

        .modal-year-type {
            font-size: 13px;
            color: var(--text-dim);
        }

        .modal-badges {
            display: flex;
            gap: 8px;
            margin: 16px 0;
            flex-wrap: wrap;
        }

        .badge {
            display: inline-flex;
            align-items: center;
            gap: 6px;
            padding: 6px 12px;
            background: var(--surface-2);
            border: 1px solid var(--border);
            border-radius: 20px;
            font-size: 12px;
            font-weight: 500;
        }

        .badge.played {
            border-color: var(--accent);
            color: var(--accent);
        }

        .modal-metadata {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 12px;
            margin: 16px 0;
            padding: 16px 0;
            border-top: 1px solid var(--border);
            border-bottom: 1px solid var(--border);
        }

        .metadata-item {
            display: flex;
            flex-direction: column;
        }

        .metadata-label {
            font-size: 11px;
            color: var(--text-dim);
            text-transform: uppercase;
            font-weight: 700;
            letter-spacing: 0.5px;
            margin-bottom: 4px;
        }

        .metadata-value {
            font-size: 13px;
            color: var(--text);
            font-weight: 500;
        }

        .modal-links {
            display: flex;
            gap: 12px;
            margin-top: 16px;
            flex-wrap: wrap;
        }

        .link-btn {
            flex: 1;
            min-width: 120px;
            padding: 10px 14px;
            background: var(--surface-2);
            border: 1px solid var(--border);
            color: var(--text);
            border-radius: 6px;
            cursor: pointer;
            font-size: 12px;
            font-weight: 600;
            font-family: Inter, sans-serif;
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 6px;
            transition: all 0.2s ease;
            text-decoration: none;
        }

        .link-btn:hover {
            border-color: var(--accent);
            color: var(--accent);
        }

        .modal-collection-badge {
            font-size: 11px;
            font-weight: 700;
            color: var(--text-dim);
            text-transform: uppercase;
            letter-spacing: 0.5px;
            margin-top: 16px;
            padding-top: 16px;
            border-top: 1px solid var(--border);
        }

        /* Responsive Design */
        @media (max-width: 900px) {
            .topbar {
                flex-direction: column;
                align-items: stretch;
            }

            .topbar > * {
                width: 100%;
            }

            .topbar-search,
            .dropdown,
            .size-slider-group {
                width: 100%;
            }

            .dropdown-btn {
                width: 100%;
                justify-content: flex-start;
            }

            .pill-group {
                width: 100%;
                justify-content: flex-start;
            }

            :root {
                --tile-size: 150px;
            }
        }

        @media (max-width: 600px) {
            :root {
                --tile-size: 130px;
            }

            .topbar {
                padding: 8px 12px;
                gap: 8px;
            }

            .topbar-logo {
                font-size: 16px;
            }

            .search-input {
                font-size: 13px;
            }

            .container {
                padding: 12px 8px;
            }

            .grid {
                gap: 12px;
            }

            .modal {
                max-width: 100%;
            }

            .modal-content {
                padding: 16px;
            }

            .modal-title {
                font-size: 20px;
            }

            .modal-metadata {
                grid-template-columns: 1fr;
            }
        }

        /* Reduced Motion */
        @media (prefers-reduced-motion: reduce) {
            * {
                animation-duration: 0.01ms !important;
                animation-iteration-count: 1 !important;
                transition-duration: 0.01ms !important;
            }
        }

        /* Empty State */
        .empty-state {
            text-align: center;
            padding: 60px 20px;
            color: var(--text-dim);
        }

        .empty-state-icon {
            font-size: 48px;
            margin-bottom: 16px;
            opacity: 0.5;
        }

        .empty-state-text {
            font-size: 16px;
            margin-bottom: 8px;
        }

        .empty-state-hint {
            font-size: 13px;
            opacity: 0.7;
        }

        /* Shuffle button active state */
        .shuffle-btn.active {
            color: var(--accent);
        }
    </style>
</head>
<body>
    <!-- Top Bar -->
    <div class="topbar">
        <div class="topbar-logo">Music.Collection</div>

        <div class="topbar-search">
            <input
                type="text"
                class="search-input"
                id="searchInput"
                placeholder="Search albums, artists..."
                aria-label="Search albums and artists"
            >
        </div>

        <div class="pill-group">
            <button class="pill-btn active" data-filter="all" aria-label="Show all albums">
                All <span class="pill-count" id="countAll"></span>
            </button>
            <button class="pill-btn" data-filter="cd" aria-label="Show CDs only">
                CDs <span class="pill-count" id="countCd"></span>
            </button>
            <button class="pill-btn" data-filter="vinyl" aria-label="Show vinyl records only">
                Vinyl <span class="pill-count" id="countVinyl"></span>
            </button>
        </div>

        <div class="dropdown">
            <button class="dropdown-btn" id="filterBtn" aria-label="Filter albums">
                Filter
                <svg width="14" height="14" viewBox="0 0 14 14" fill="none" xmlns="http://www.w3.org/2000/svg">
                    <path d="M2 4H12M4 7H10M6 10H8" stroke="currentColor" stroke-width="1.5" stroke-linecap="round"/>
                </svg>
            </button>
            <div class="dropdown-menu" id="filterMenu">
                <button class="dropdown-item active" data-type="all">All Types</button>
                <button class="dropdown-item" data-type="Album">Album</button>
                <button class="dropdown-item" data-type="EP">EP</button>
                <button class="dropdown-item" data-type="Single">Single</button>
                <button class="dropdown-item" data-type="Compilation">Compilation</button>
            </div>
        </div>

        <div class="dropdown">
            <button class="dropdown-btn" id="sortBtn" aria-label="Sort albums">
                Sort
                <svg width="14" height="14" viewBox="0 0 14 14" fill="none" xmlns="http://www.w3.org/2000/svg">
                    <path d="M2 3H12M2 7H10M2 11H8" stroke="currentColor" stroke-width="1.5" stroke-linecap="round"/>
                </svg>
            </button>
            <div class="dropdown-menu" id="sortMenu">
                <button class="dropdown-item active" data-sort="artist">Artist A-Z</button>
                <button class="dropdown-item" data-sort="title">Title A-Z</button>
                <button class="dropdown-item" data-sort="year-desc">Year (New First)</button>
                <button class="dropdown-item" data-sort="year-asc">Year (Old First)</button>
                <button class="dropdown-item" data-sort="recently-played">Recently Played</button>
            </div>
        </div>

        <button class="icon-btn shuffle-btn" id="shuffleBtn" aria-label="Shuffle albums">
            <svg width="16" height="16" viewBox="0 0 16 16" fill="none" xmlns="http://www.w3.org/2000/svg">
                <path d="M2 3H4M12 13H14M4 3L2 5L4 7M12 9L14 11L12 13M5 3H11C12.1 3 13 3.9 13 5V8M11 13H5C3.9 13 3 12.1 3 11V8" stroke="currentColor" stroke-width="1.2" stroke-linecap="round" stroke-linejoin="round"/>
            </svg>
        </button>

        <div class="size-slider-group">
            <svg width="14" height="14" viewBox="0 0 14 14" fill="none" xmlns="http://www.w3.org/2000/svg">
                <rect x="1" y="1" width="3" height="3" stroke="currentColor" stroke-width="1"/>
                <rect x="5" y="1" width="3" height="3" stroke="currentColor" stroke-width="1"/>
                <rect x="9" y="1" width="3" height="3" stroke="currentColor" stroke-width="1"/>
                <rect x="1" y="5" width="3" height="3" stroke="currentColor" stroke-width="1"/>
                <rect x="5" y="5" width="3" height="3" stroke="currentColor" stroke-width="1"/>
                <rect x="9" y="5" width="3" height="3" stroke="currentColor" stroke-width="1"/>
                <rect x="1" y="9" width="3" height="3" stroke="currentColor" stroke-width="1"/>
                <rect x="5" y="9" width="3" height="3" stroke="currentColor" stroke-width="1"/>
                <rect x="9" y="9" width="3" height="3" stroke="currentColor" stroke-width="1"/>
            </svg>
            <input
                type="range"
                min="120"
                max="300"
                value="170"
                class="size-slider"
                id="sizeSlider"
                aria-label="Adjust tile size"
            >
        </div>
    </div>

    <!-- Main Container -->
    <div class="container">
        <div class="grid" id="grid"></div>
        <div class="empty-state" id="emptyState" style="display: none;">
            <div class="empty-state-icon">🎵</div>
            <div class="empty-state-text">No albums found</div>
            <div class="empty-state-hint">Try adjusting your filters or search</div>
        </div>
    </div>

    <!-- Modal -->
    <div class="modal-overlay" id="modalOverlay">
        <div class="modal" id="modal" role="dialog" aria-labelledby="modalTitle" aria-modal="true">
            <button class="modal-close" id="modalClose" aria-label="Close modal">&times;</button>
            <img class="modal-image" id="modalImage" alt="">
            <div class="modal-content">
                <div class="modal-header">
                    <div class="modal-artist" id="modalArtist"></div>
                    <h2 class="modal-title" id="modalTitle"></h2>
                    <div class="modal-year-type">
                        <span id="modalYear"></span> · <span id="modalType"></span>
                    </div>
                </div>

                <div class="modal-badges" id="modalBadges"></div>

                <div class="modal-metadata">
                    <div class="metadata-item">
                        <div class="metadata-label">Runtime</div>
                        <div class="metadata-value" id="modalRuntime"></div>
                    </div>
                    <div class="metadata-item">
                        <div class="metadata-label">Type</div>
                        <div class="metadata-value" id="modalTypeValue"></div>
                    </div>
                    <div class="metadata-item">
                        <div class="metadata-label">Last Played</div>
                        <div class="metadata-value" id="modalLastPlayed"></div>
                    </div>
                </div>

                <div class="modal-links" id="modalLinks"></div>

                <div class="modal-collection-badge" id="modalCollectionBadge"></div>
            </div>
        </div>
    </div>

        // ============ HELPERS ============
        function createPlaceholderSVG() {
            const svg = document.createElementNS('http://www.w3.org/2000/svg', 'svg');
            svg.setAttribute('width', '100%');
            svg.setAttribute('height', '100%');
            svg.setAttribute('viewBox', '0 0 200 200');
            svg.setAttribute('class', 'card-placeholder');

            const circle = document.createElementNS('http://www.w3.org/2000/svg', 'circle');
            circle.setAttribute('cx', '100');
            circle.setAttribute('cy', '100');
            circle.setAttribute('r', '60');
            circle.setAttribute('fill', 'rgba(255,255,255,0.1)');

            const note1 = document.createElementNS('http://www.w3.org/2000/svg', 'circle');
            note1.setAttribute('cx', '85');
            note1.setAttribute('cy', '90');
            note1.setAttribute('r', '8');
            note1.setAttribute('fill', 'rgba(255,255,255,0.2)');

            const note2 = document.createElementNS('http://www.w3.org/2000/svg', 'circle');
            note2.setAttribute('cx', '115');
            note2.setAttribute('cy', '110');
            note2.setAttribute('r', '8');
            note2.setAttribute('fill', 'rgba(255,255,255,0.2)');

            svg.appendChild(circle);
            svg.appendChild(note1);
            svg.appendChild(note2);
            return svg;
        }

        function fmtDate(dateStr) {
            if (!dateStr) return "Never played!";
            try {
                const date = new Date(dateStr);
                if (isNaN(date.getTime())) return "Never played!";
                return date.toLocaleDateString('en-GB', {
                    day: 'numeric',
                    month: 'short',
                    year: 'numeric'
                });
            } catch {
                return "Never played!";
            }
        }

        function createPlayedIcon(played) {
            const svg = document.createElementNS('http://www.w3.org/2000/svg', 'svg');
            svg.setAttribute('width', '16');
            svg.setAttribute('height', '16');
            svg.setAttribute('viewBox', '0 0 16 16');
            svg.setAttribute('fill', 'none');

            const circle = document.createElementNS('http://www.w3.org/2000/svg', 'circle');
            circle.setAttribute('cx', '8');
            circle.setAttribute('cy', '8');
            circle.setAttribute('r', '7');
            circle.setAttribute('stroke', 'currentColor');
            circle.setAttribute('stroke-width', '1');

            if (played) {
                const path = document.createElementNS('http://www.w3.org/2000/svg', 'path');
                path.setAttribute('d', 'M6 8.5L7.5 10L10.5 6');
                path.setAttribute('stroke', 'currentColor');
                path.setAttribute('stroke-width', '1.5');
                path.setAttribute('stroke-linecap', 'round');
                path.setAttribute('stroke-linejoin', 'round');
                svg.appendChild(path);
            }

            svg.appendChild(circle);
            return svg;
        }

        function createHeadphonesIcon() {
            const svg = document.createElementNS('http://www.w3.org/2000/svg', 'svg');
            svg.setAttribute('width', '16');
            svg.setAttribute('height', '16');
            svg.setAttribute('viewBox', '0 0 16 16');
            svg.setAttribute('fill', 'none');

            const path = document.createElementNS('http://www.w3.org/2000/svg', 'path');
            path.setAttribute('d', 'M8 1C4.5 1 2 3.5 2 7V10C2 10.55 1.55 11 1 11C0.45 11 0 11.45 0 12V13C0 14.1 0.9 15 2 15H4V11H2V7C2 4.6 4.6 2.5 8 2.5C11.4 2.5 14 4.6 14 7V11H12V15H14C15.1 15 16 14.1 16 13V12C16 11.45 15.55 11 15 11C14.45 11 14 10.55 14 10V7C14 3.5 11.5 1 8 1Z');
            path.setAttribute('fill', 'currentColor');

            svg.appendChild(path);
            return svg;
        }

        function createLinkIcon(type) {
            const svg = document.createElementNS('http://www.w3.org/2000/svg', 'svg');
            svg.setAttribute('width', '14');
            svg.setAttribute('height', '14');
            svg.setAttribute('viewBox', '0 0 14 14');
            svg.setAttribute('fill', 'none');

            const path = document.createElementNS('http://www.w3.org/2000/svg', 'path');
            if (type === 'external') {
                path.setAttribute('d', 'M2 2H9V5M13 1L6 8M11 11H2V2H7');
            } else if (type === 'scrobble') {
                path.setAttribute('d', 'M7 1C3.7 1 1 3.7 1 7C1 10.3 3.7 13 7 13C10.3 13 13 10.3 13 7M7 4V7L10 9');
            }
            path.setAttribute('stroke', 'currentColor');
            path.setAttribute('stroke-width', '1');
            path.setAttribute('stroke-linecap', 'round');
            path.setAttribute('stroke-linejoin', 'round');

            svg.appendChild(path);
            return svg;
        }

        function fisherYatesShuffle(arr) {
            const result = [...arr];
            for (let i = result.length - 1; i > 0; i--) {
                const j = Math.floor(Math.random() * (i + 1));
                [result[i], result[j]] = [result[j], result[i]];
            }
            return result;
        }

        // ============ STATE ============
        let allAlbums = [];
        let filteredAlbums = [];
        let currentFilter = 'all';
        let currentTypeFilter = 'all';
        let currentSort = 'artist';
        let isShuffled = false;
        let shuffledAlbums = [];

        // ============ INITIALIZATION ============
        function initData() {
            allAlbums = [
                ...CD_ALBUMS.map(a => ({ ...a, collection: 'cd' })),
                ...VINYL_ALBUMS.map(a => ({ ...a, collection: 'vinyl' }))
            ];
            applyFiltersAndSort();
            updateCounts();
        }

        // ============ FILTERING & SORTING ============
        function applyFiltersAndSort() {
            let result = allAlbums;

            // Filter by collection
            if (currentFilter !== 'all') {
                result = result.filter(a => a.collection === currentFilter);
            }

            // Filter by type
            if (currentTypeFilter !== 'all') {
                result = result.filter(a => a.type === currentTypeFilter);
            }

            // Filter by search
            const search = document.getElementById('searchInput').value.toLowerCase();
            if (search) {
                result = result.filter(a =>
                    a.artist.toLowerCase().includes(search) ||
                    a.title.toLowerCase().includes(search)
                );
            }

            // Apply sort
            if (isShuffled) {
                result = shuffledAlbums.filter(a => result.includes(a));
            } else {
                result = sortAlbums(result, currentSort);
            }

            filteredAlbums = result;
            render();
        }

        function sortAlbums(arr, sortType) {
            const result = [...arr];
            switch (sortType) {
                case 'artist':
                    result.sort((a, b) => a.artist.localeCompare(b.artist));
                    break;
                case 'title':
                    result.sort((a, b) => a.title.localeCompare(b.title));
                    break;
                case 'year-desc':
                    result.sort((a, b) => b.year - a.year);
                    break;
                case 'year-asc':
                    result.sort((a, b) => a.year - b.year);
                    break;
                case 'recently-played':
                    result.sort((a, b) => {
                        const aDate = a.last_played ? new Date(a.last_played).getTime() : -1;
                        const bDate = b.last_played ? new Date(b.last_played).getTime() : -1;
                        return bDate - aDate;
                    });
                    break;
            }
            return result;
        }

        // ============ RENDERING ============
        function createCard(album) {
            const card = document.createElement('div');
            card.className = 'card';
            card.role = 'button';
            card.tabIndex = 0;
            card.setAttribute('aria-label', `${album.artist} - ${album.title}`);

            // Image wrapper
            const imgWrapper = document.createElement('div');
            imgWrapper.className = 'card-image-wrapper';

            const img = document.createElement('img');
            img.className = 'card-image';
            img.alt = `${album.artist} - ${album.title}`;
            img.loading = 'eager';
            imgWrapper.appendChild(img);

            const errorHandler = () => {
                img.remove();
                imgWrapper.appendChild(createPlaceholderSVG());
            };
            img.addEventListener('error', errorHandler);
            img.src = album.cover_url;

            // Content
            const content = document.createElement('div');
            content.className = 'card-content';

            const title = document.createElement('div');
            title.className = 'card-title';
            title.textContent = album.title;

            const meta = document.createElement('div');
            meta.className = 'card-meta';
            meta.textContent = `${album.artist} · ${album.year}`;

            const runtime = document.createElement('div');
            runtime.className = 'card-runtime';
            runtime.textContent = album.length;

            content.appendChild(title);
            content.appendChild(meta);
            content.appendChild(runtime);

            // Actions
            const actions = document.createElement('div');
            actions.className = 'card-actions';

            // Played button
            const playedBtn = document.createElement('button');
            playedBtn.className = 'icon-btn';
            if (!album.played) {
                playedBtn.classList.add('disabled');
            }
            playedBtn.setAttribute('aria-label', album.played ? 'Album played' : 'Album not played');
            playedBtn.appendChild(createPlayedIcon(album.played));
            playedBtn.style.pointerEvents = 'none';
            actions.appendChild(playedBtn);

            // Scrobble button
            if (album.direct_scrobble_url) {
                const scrobbleBtn = document.createElement('button');
                scrobbleBtn.className = 'icon-btn';
                scrobbleBtn.setAttribute('aria-label', 'Open scrobble');
                scrobbleBtn.appendChild(createHeadphonesIcon());
                scrobbleBtn.addEventListener('click', (e) => {
                    e.stopPropagation();
                    window.open(album.direct_scrobble_url, '_blank');
                });
                actions.appendChild(scrobbleBtn);
            }

            // Collection badge
            const badge = document.createElement('div');
            badge.className = 'collection-badge';
            badge.textContent = album.collection === 'cd' ? 'CD' : 'Vinyl';
            actions.appendChild(badge);

            content.appendChild(actions);
            card.appendChild(imgWrapper);
            card.appendChild(content);

            // Click to open modal
            card.addEventListener('click', () => openModal(album));
            card.addEventListener('keydown', (e) => {
                if (e.key === 'Enter' || e.key === ' ') {
                    e.preventDefault();
                    openModal(album);
                }
            });

            return card;
        }

        function render() {
            const grid = document.getElementById('grid');
            const emptyState = document.getElementById('emptyState');

            if (filteredAlbums.length === 0) {
                grid.style.display = 'none';
                emptyState.style.display = 'block';
                return;
            }

            grid.style.display = 'grid';
            emptyState.style.display = 'none';
            grid.innerHTML = '';
            filteredAlbums.forEach(album => {
                grid.appendChild(createCard(album));
            });
        }

        // ============ MODAL ============
        function openModal(album) {
            const modalOverlay = document.getElementById('modalOverlay');
            const modalImg = document.getElementById('modalImage');
            const modalArtist = document.getElementById('modalArtist');
            const modalTitle = document.getElementById('modalTitle');
            const modalYear = document.getElementById('modalYear');
            const modalType = document.getElementById('modalType');
            const modalRuntime = document.getElementById('modalRuntime');
            const modalTypeValue = document.getElementById('modalTypeValue');
            const modalLastPlayed = document.getElementById('modalLastPlayed');
            const modalBadges = document.getElementById('modalBadges');
            const modalLinks = document.getElementById('modalLinks');
            const modalCollectionBadge = document.getElementById('modalCollectionBadge');

            modalArtist.textContent = album.artist;
            modalTitle.textContent = album.title;
            modalYear.textContent = album.year;
            modalType.textContent = album.type;
            modalRuntime.textContent = album.length;
            modalTypeValue.textContent = album.type;
            modalLastPlayed.textContent = fmtDate(album.last_played);
            modalCollectionBadge.textContent = album.collection === 'cd' ? 'CD Collection' : 'Vinyl Collection';

            // Image
            modalImg.alt = `${album.artist} - ${album.title}`;
            modalImg.addEventListener('error', () => {
                modalImg.replaceWith(createPlaceholderSVG());
            }, { once: true });
            modalImg.src = album.cover_url;

            // Badges
            modalBadges.innerHTML = '';
            if (album.played) {
                const badge = document.createElement('div');
                badge.className = 'badge played';
                badge.innerHTML = `${createPlayedIcon(true).outerHTML} <span>Played!</span>`;
                modalBadges.appendChild(badge);
            }
            if (album.scrobble) {
                const badge = document.createElement('div');
                badge.className = 'badge';
                badge.innerHTML = `<span>${album.scrobble}</span>`;
                modalBadges.appendChild(badge);
            }

            // Links
            modalLinks.innerHTML = '';
            if (album.mb_url) {
                const link = document.createElement('a');
                link.href = album.mb_url;
                link.target = '_blank';
                link.className = 'link-btn';
                link.innerHTML = `${createLinkIcon('external').outerHTML} MusicBrainz`;
                modalLinks.appendChild(link);
            }
            if (album.discogs_url) {
                const link = document.createElement('a');
                link.href = album.discogs_url;
                link.target = '_blank';
                link.className = 'link-btn';
                link.innerHTML = `${createLinkIcon('external').outerHTML} Discogs`;
                modalLinks.appendChild(link);
            }
            if (album.direct_scrobble_url) {
                const link = document.createElement('a');
                link.href = album.direct_scrobble_url;
                link.target = '_blank';
                link.className = 'link-btn';
                link.innerHTML = `${createHeadphonesIcon().outerHTML} Scrobble`;
                modalLinks.appendChild(link);
            }

            modalOverlay.classList.add('show');
            document.getElementById('modal').focus();
        }

        function closeModal() {
            document.getElementById('modalOverlay').classList.remove('show');
        }

        // ============ EVENT LISTENERS ============
        document.getElementById('modalClose').addEventListener('click', closeModal);
        document.getElementById('modalOverlay').addEventListener('click', (e) => {
            if (e.target === document.getElementById('modalOverlay')) {
                closeModal();
            }
        });

        document.addEventListener('keydown', (e) => {
            if (e.key === 'Escape') {
                closeModal();
            }
        });

        // Search
        document.getElementById('searchInput').addEventListener('input', applyFiltersAndSort);

        // Collection filter
        document.querySelectorAll('.pill-btn').forEach(btn => {
            btn.addEventListener('click', () => {
                document.querySelectorAll('.pill-btn').forEach(b => b.classList.remove('active'));
                btn.classList.add('active');
                currentFilter = btn.getAttribute('data-filter');
                applyFiltersAndSort();
            });
        });

        // Type filter dropdown
        document.getElementById('filterBtn').addEventListener('click', () => {
            const menu = document.getElementById('filterMenu');
            menu.classList.toggle('show');
            document.getElementById('sortMenu').classList.remove('show');
        });

        document.querySelectorAll('#filterMenu .dropdown-item').forEach(item => {
            item.addEventListener('click', () => {
                document.querySelectorAll('#filterMenu .dropdown-item').forEach(i => i.classList.remove('active'));
                item.classList.add('active');
                currentTypeFilter = item.getAttribute('data-type');
                document.getElementById('filterMenu').classList.remove('show');
                applyFiltersAndSort();
            });
        });

        // Sort dropdown
        document.getElementById('sortBtn').addEventListener('click', () => {
            const menu = document.getElementById('sortMenu');
            menu.classList.toggle('show');
            document.getElementById('filterMenu').classList.remove('show');
        });

        document.querySelectorAll('#sortMenu .dropdown-item').forEach(item => {
            item.addEventListener('click', () => {
                document.querySelectorAll('#sortMenu .dropdown-item').forEach(i => i.classList.remove('active'));
                item.classList.add('active');
                currentSort = item.getAttribute('data-sort');
                isShuffled = false;
                document.getElementById('shuffleBtn').classList.remove('active');
                document.getElementById('sortMenu').classList.remove('show');
                applyFiltersAndSort();
            });
        });

        // Shuffle
        document.getElementById('shuffleBtn').addEventListener('click', () => {
            isShuffled = !isShuffled;
            document.getElementById('shuffleBtn').classList.toggle('active');
            if (isShuffled) {
                shuffledAlbums = fisherYatesShuffle(filteredAlbums);
            }
            applyFiltersAndSort();
        });

        // Size slider
        document.getElementById('sizeSlider').addEventListener('input', (e) => {
            document.documentElement.style.setProperty('--tile-size', e.target.value + 'px');
        });

        // Close dropdowns on outside click
        document.addEventListener('click', (e) => {
            if (!e.target.closest('.dropdown')) {
                document.querySelectorAll('.dropdown-menu').forEach(m => m.classList.remove('show'));
            }
        });

        // ============ UTILITY FUNCTIONS ============
        function updateCounts() {
            const all = allAlbums.length;
            const cd = allAlbums.filter(a => a.collection === 'cd').length;
            const vinyl = allAlbums.filter(a => a.collection === 'vinyl').length;

            document.getElementById('countAll').textContent = `(${all})`;
            document.getElementById('countCd').textContent = `(${cd})`;
            document.getElementById('countVinyl').textContent = `(${vinyl})`;
        }

        // ============ START ============
        initData();
    </script>
